services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: thesisventure-gateway
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "18789:18789"
    volumes:
      - openclaw-data:/home/node/.openclaw
      - ./config:/home/node/.openclaw/config
      - ./knowledge-base:/home/node/.openclaw/workspace/thesis-venture/knowledge-base
      - ./knowledge-base/ben:/home/node/.openclaw/workspace/ben/knowledge-base
      - ./knowledge-base/sarah:/home/node/.openclaw/workspace/sarah/knowledge-base
      - ./knowledge-base/alex:/home/node/.openclaw/workspace/alex/knowledge-base
      - ./knowledge-base/charlie:/home/node/.openclaw/workspace/charlie/knowledge-base
      - ./research:/home/node/.openclaw/workspace/thesis-venture/research
      - ./research:/home/node/.openclaw/workspace/ben/research
      - ./research:/home/node/.openclaw/workspace/sarah/research
      - ./research:/home/node/.openclaw/workspace/alex/research
      - ./research:/home/node/.openclaw/workspace/charlie/research
      - ./portfolio:/home/node/.openclaw/workspace/thesis-venture/portfolio
      - ./portfolio:/home/node/.openclaw/workspace/ben/portfolio
      - ./portfolio:/home/node/.openclaw/workspace/sarah/portfolio
      - ./portfolio:/home/node/.openclaw/workspace/alex/portfolio
      - ./portfolio:/home/node/.openclaw/workspace/charlie/portfolio
    environment:
      - GOOGLE_API_KEY=${GEMINI_API_KEY}
      - OPENCLAW_GATEWAY_TOKEN=${GATEWAY_TOKEN}
      - SEARXNG_BASE_URL=http://searxng:8080
    platform: linux/arm64
    depends_on:
      - searxng

  searxng:
    image: searxng/searxng:latest
    container_name: thesisventure-searxng
    restart: unless-stopped
    platform: linux/arm64

volumes:
  openclaw-data: